services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: transparencia
      POSTGRES_PASSWORD: transparencia
      POSTGRES_DB: transparencia_br
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transparencia -d transparencia_br"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://transparencia:transparencia@db:5432/transparencia_br
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
